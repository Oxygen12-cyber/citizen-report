<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/home.css">
    <title>Home - Citizen Report</title>
</head>
<body>
    <header class="app-bar">
        <div class="brand">
            <h1>Citizen Report</h1>
            <p>Live Incident Feed</p>
        </div>
        <div class="actions">
            <button data-route="add-incident" class="ghost-btn">Report</button>
            <button id="logout-btn" class="ghost-btn">Logout</button>
        </div>
    </header>

    <main class="content">
        <section class="filter-panel">
            <label for="category-filter">Filter by category</label>
            <select id="category-filter">
                <option value="">All Categories</option>
            </select>

            <label for="mine-only" class="mine-only-wrap">
                <input type="checkbox" id="mine-only">
                Only my reports
            </label>
        </section>

        <section>
            <div id="incidents-list" class="scrollable-list"></div>
        </section>
    </main>

    <button id="add-incident-fab" class="fab" aria-label="Add incident">+</button>

    <div id="incident-details-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-details" role="button" aria-label="Close incident details">&times;</span>
            <div id="incident-details"></div>
        </div>
    </div>
</body>
</html>
