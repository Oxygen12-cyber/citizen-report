<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/add-incident.css">
    <title>Add Incident - Citizen Report</title>
</head>
<body>
    <header class="app-bar">
        <button id="back-btn" class="ghost-btn" data-route="home">← Feed</button>
        <h1>Report Incident</h1>
        <span class="app-bar-spacer"></span>
    </header>

    <main class="content">
        <form data-form="add-incident" class="report-card">
            <p class="supporting-text">Share clear details for quick response.</p>

            <label for="title">Incident Title</label>
            <input id="title" name="title" type="text" placeholder="Short title" required>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="">Select Category</option>
            </select>

            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="What happened?" required></textarea>

            <button type="button" id="take-photo" class="secondary-btn">Attach Photo</button>
            <img id="photo-preview" alt="Incident photo preview" style="display:none; max-width:100%;">

            <button type="submit">Submit Report</button>
        </form>
    </main>
</body>
</html>
