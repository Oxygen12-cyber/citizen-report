<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/login.css">
    <title>Login - Citizen Report</title>
</head>
<body>
    <header class="app-bar">
        <div class="brand">
            <img src="img/logo.png" alt="Citizen Report logo" class="logo">
            <h1>Citizen Report</h1>
        </div>
    </header>

    <main class="content">
        <section class="auth-card">
            <p class="eyebrow">Community Safety Portal</p>
            <h2>Sign in to continue</h2>
            <p class="supporting-text">Track incidents, review updates, and submit reports in seconds.</p>

            <form data-form="login">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Enter username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Enter password" required>

                <button type="submit">Login</button>

                <div class="demo-info">
                    <p><strong>Demo credentials</strong></p>
                    <p><span class="credentials">demo</span> / <span class="credentials">demo</span></p>
                    <p class="tiny">Other test accounts: john/password123, jane/password456</p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
