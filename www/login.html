<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/login.css">
    <title>Login - Citizen Report</title>
</head>
<body>
    <div class="app-bar">
        <h1>Login</h1>
    </div>
    <div class="content">
        <form data-form="login">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Welcome to Citizen Report</h2>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="demo-info">
                <p style="margin-top: 0; font-weight: bold;">🔐 Demo Credentials:</p>
                <p>Username: <span class="credentials">demo</span></p>
                <p>Password: <span class="credentials">demo</span></p>
                <hr style="margin: 10px 0; border: none; border-top: 1px solid #007bff;">
                <p style="margin: 5px 0 0 0; color: #666; font-size: 12px;">Other test accounts:</p>
                <p style="margin: 3px 0;">john / password123</p>
                <p style="margin: 3px 0;">jane / password456</p>
            </div>
        </form>
    </div>
</body>
</html>
