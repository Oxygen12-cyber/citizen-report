<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/login.css">
    <title>Login - Citizen Report</title>
</head>
<body>
    <header class="app-bar">
        <div class="brand">
            <img src="img/logo.png" alt="Citizen Report logo" class="logo">
            <h1>Citizen Report</h1>
        </div>
    </header>

    <main class="content">
        <section class="auth-card">
            <p class="eyebrow">Community Safety Portal</p>
            <h2>Sign in to continue</h2>
            <p class="supporting-text">Use your normal WordPress username and password.</p>

            <form data-form="login">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Enter username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Enter password" required>

                <button type="submit">Login</button>
            </form>

            <p class="auth-switch">No account yet? <a href="#/signup" data-route="signup">Create account</a></p>
        </section>
    </main>
</body>
</html>
