name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Ensure Android platform exists
        run: |
          if [ ! -d "platforms/android" ]; then
            cordova platform add android
          fi

      - name: Build unsigned debug APK
        run: cordova build android --debug -- --packageType=apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-report-debug-apk
          path: |
            platforms/android/app/build/outputs/apk/debug/*.apk
            platforms/android/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
